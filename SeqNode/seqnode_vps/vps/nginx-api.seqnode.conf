# ============================================================
#  SeqNode-OS — Nginx config for api.seqnode.onnetweb.com
#
#  Deploy: copy to /etc/nginx/sites-available/api.seqnode.onnetweb.com
#          then: ln -s /etc/nginx/sites-available/api.seqnode.onnetweb.com \
#                      /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
#  SSL:    sudo certbot --nginx -d api.seqnode.onnetweb.com
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.seqnode.onnetweb.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.seqnode.onnetweb.com;

    # ── SSL (certbot will update these paths automatically) ──────────────
    ssl_certificate     /etc/letsencrypt/live/api.seqnode.onnetweb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.seqnode.onnetweb.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static files root (status page) ─────────────────────────────────
    root /var/www/seqnode-api;
    index status.html;

    # ── Root → static status page ────────────────────────────────────────
    location = / {
        try_files /status.html =200;
    }

    # ── API + preflight — CORS gerido inteiramente pelo FastAPI ──────────
    # Não adicionamos headers CORS aqui para evitar duplicação com o
    # CORSMiddleware do FastAPI (que inclui X-Seqnode-User-Id e credentials).
    # Todos os métodos, incluindo OPTIONS (preflight), passam para o FastAPI.
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffering    off;
    }

    # ── WebSocket (logs + agent) ──────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-Frame-Options        "SAMEORIGIN"         always;
    add_header Referrer-Policy        "strict-origin"      always;

    # ── Logs ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/seqnode-api.access.log;
    error_log  /var/log/nginx/seqnode-api.error.log;
}
