name: "SeqNode System Test"
id: "seqnode_test"
version: "1.0.0"
category: "Utilities"
description: >
  Diagnostic plugin that tests all major SeqNode-OS subsystems without requiring
  any external bioinformatics tools. Run this node alone to verify:
  - Command execution and real-time log streaming
  - Parameter passing (string, int, float, bool, choices, file)
  - Input/output path resolution and file creation
  - Environment and system info
  - Template rendering (Jinja-style conditionals and variables)
  No installation required — uses only standard bash/python3.
author: "SeqNode-OS"
license: "MIT"
tags: [test, diagnostic, debug, system, utilities]

runtime:
  type: system

params:

  # ── Test Controls ─────────────────────────────────────────────────────────

  test_string:
    type: string
    label: "Test String Param"
    default: "Hello SeqNode!"
    description: >
      A free-text parameter. Its value will be echoed in the log.
      Edit this to verify string params are correctly passed to the command.
    category: "Test Controls"

  test_int:
    type: int
    label: "Test Integer Param"
    default: 42
    min: 1
    max: 9999
    description: >
      An integer parameter. Used to test numeric type handling and min/max bounds.
    category: "Test Controls"

  test_float:
    type: float
    label: "Test Float Param"
    default: 3.14
    description: >
      A float parameter. Tests decimal number passing and template rendering.
    category: "Test Controls"

  test_bool:
    type: bool
    label: "Enable Extended Tests"
    default: true
    description: >
      When enabled, runs additional checks: Python3 availability, disk space,
      memory info, and output file write test.
    category: "Test Controls"

  test_choice:
    type: string
    label: "Log Verbosity"
    default: "normal"
    choices: ["minimal", "normal", "verbose"]
    description: >
      Controls how much detail is printed during the test run.
      minimal: only pass/fail summaries.
      normal: section headers + key results.
      verbose: all detail including environment variables.
    category: "Test Controls"

  test_file:
    type: file
    extension: [".txt", ".csv", ".tsv", ".bed", ".fa", ".fasta", ".bam", ".vcf"]
    label: "Optional Input File (browse test)"
    default: ""
    description: >
      Optional — leave empty to skip file-existence check.
      If set, the test will verify the file exists and report its size.
      Use the browse button (📄) to test the file browser dialog.
    category: "Test Controls"

inputs:

  input_dir:
    type: file
    label: "Input Directory (optional)"
    required: false
    description: >
      Optional directory path. If provided, the test will list its contents
      (up to 10 entries) and report the total file count.
      Use the 📁 browse button to select a folder (batch mode test).

outputs:

  test_report:
    type: file
    extensions: [".txt"]
    label: "Test Report"
    description: >
      Text file written to the output path with a summary of all test results.
      Leave empty to auto-name in the default output directory.

command:
  template: |
    #!/bin/bash
    set -euo pipefail

    # ═══════════════════════════════════════════════════════════════════
    #  SeqNode-OS System Diagnostic — generated by seqnode_test plugin
    # ═══════════════════════════════════════════════════════════════════

    PASS="✔"
    FAIL="✘"
    INFO="ℹ"
    WARN="⚠"
    SEP="────────────────────────────────────────────────────────"

    echo ""
    echo "╔══════════════════════════════════════════════════════╗"
    echo "║       SeqNode-OS System Diagnostic v1.0.0           ║"
    echo "╚══════════════════════════════════════════════════════╝"
    echo ""

    ERRORS=0
    WARNINGS=0

    # ───────────────────────────────────────────────────────
    # 1. PARAMETER PASSING
    # ───────────────────────────────────────────────────────
    echo "[ 1 / 6 ]  Parameter Passing"
    echo "$SEP"

    echo "  $INFO  test_string  = {test_string}"
    echo "  $INFO  test_int     = {test_int}"
    echo "  $INFO  test_float   = {test_float}"
    echo "  $INFO  test_bool    = {test_bool}"
    echo "  $INFO  test_choice  = {test_choice}"

    {%- if test_string %}
    echo "  $PASS  String param received and non-empty"
    {%- else %}
    echo "  $WARN  String param is empty"
    WARNINGS=$((WARNINGS+1))
    {%- endif %}

    {%- if test_int > 0 %}
    echo "  $PASS  Integer param received: {test_int} > 0"
    {%- else %}
    echo "  $FAIL  Integer param is zero or negative"
    ERRORS=$((ERRORS+1))
    {%- endif %}

    {%- if test_bool %}
    echo "  $PASS  Bool param is TRUE — extended tests ENABLED"
    {%- else %}
    echo "  $INFO  Bool param is FALSE — extended tests SKIPPED"
    {%- endif %}
    echo ""

    # ───────────────────────────────────────────────────────
    # 2. SHELL ENVIRONMENT
    # ───────────────────────────────────────────────────────
    echo "[ 2 / 6 ]  Shell Environment"
    echo "$SEP"
    echo "  $INFO  Shell       : $SHELL"
    echo "  $INFO  Bash version: $BASH_VERSION"
    echo "  $INFO  Hostname    : $(hostname 2>/dev/null || echo 'unavailable')"
    echo "  $INFO  User        : $(whoami 2>/dev/null || echo 'unavailable')"
    echo "  $INFO  Working dir : $(pwd)"
    echo "  $INFO  Date/Time   : $(date '+%Y-%m-%d %H:%M:%S')"
    echo "  $PASS  Shell environment OK"
    echo ""

    # ───────────────────────────────────────────────────────
    # 3. OPTIONAL FILE PARAM TEST
    # ───────────────────────────────────────────────────────
    echo "[ 3 / 6 ]  File Parameter / Browse Button Test"
    echo "$SEP"

    {%- if test_file %}
    TEST_FILE="{test_file}"
    if [ -f "$TEST_FILE" ]; then
        FSIZE=$(wc -c < "$TEST_FILE" 2>/dev/null || echo "?")
        echo "  $PASS  File exists: $TEST_FILE"
        echo "  $INFO  Size: $FSIZE bytes"
    elif [ -d "$TEST_FILE" ]; then
        echo "  $INFO  Path is a directory: $TEST_FILE"
    else
        echo "  $WARN  File not found: $TEST_FILE"
        WARNINGS=$((WARNINGS+1))
    fi
    {%- else %}
    echo "  $INFO  No file path provided — browse button test SKIPPED"
    echo "  $INFO  To test: set 'Optional Input File' using the 📄 browse button"
    {%- endif %}
    echo ""

    # ───────────────────────────────────────────────────────
    # 4. INPUT/OUTPUT PATH RESOLUTION
    # ───────────────────────────────────────────────────────
    echo "[ 4 / 6 ]  Input / Output Path Resolution"
    echo "$SEP"

    {%- if input_dir %}
    INPUT_PATH="{input_dir}"
    echo "  $INFO  Input dir   : $INPUT_PATH"
    if [ -d "$INPUT_PATH" ]; then
        FCOUNT=$(find "$INPUT_PATH" -maxdepth 1 -type f 2>/dev/null | wc -l)
        DCOUNT=$(find "$INPUT_PATH" -maxdepth 1 -type d 2>/dev/null | wc -l)
        echo "  $PASS  Directory exists: $FCOUNT file(s), $((DCOUNT-1)) subdir(s)"
        echo "  $INFO  Contents (up to 10):"
        ls -1 "$INPUT_PATH" 2>/dev/null | head -10 | while read -r F; do echo "         $F"; done
    else
        echo "  $WARN  Input directory not found: $INPUT_PATH"
        WARNINGS=$((WARNINGS+1))
    fi
    {%- else %}
    echo "  $INFO  No input_dir provided — input resolution test SKIPPED"
    {%- endif %}

    OUTPUT_FILE="{test_report}"
    echo "  $INFO  Output path : $OUTPUT_FILE"

    # Create output directory if needed
    OUTPUT_DIR=$(dirname "$OUTPUT_FILE")
    if [ "$OUTPUT_DIR" != "." ] && [ -n "$OUTPUT_DIR" ]; then
        mkdir -p "$OUTPUT_DIR" 2>/dev/null && echo "  $PASS  Output directory ready: $OUTPUT_DIR" \
            || { echo "  $WARN  Could not create output dir: $OUTPUT_DIR"; WARNINGS=$((WARNINGS+1)); }
    fi
    echo ""

    # ───────────────────────────────────────────────────────
    # 5. EXTENDED TESTS (only if test_bool = true)
    # ───────────────────────────────────────────────────────
    {%- if test_bool %}
    echo "[ 5 / 6 ]  Extended Tests (bool=true)"
    echo "$SEP"

    # Python3 check
    if command -v python3 &>/dev/null; then
        PY_VER=$(python3 --version 2>&1)
        echo "  $PASS  python3 available: $PY_VER"
    else
        echo "  $WARN  python3 not found in PATH"
        WARNINGS=$((WARNINGS+1))
    fi

    # Common bioinformatics tools
    for TOOL in samtools bwa gatk bcftools bedtools fastp; do
        if command -v "$TOOL" &>/dev/null; then
            echo "  $PASS  $TOOL found in PATH"
        else
            echo "  $INFO  $TOOL not in PATH (not required for this test)"
        fi
    done

    # Disk space on /tmp
    echo ""
    echo "  Disk space:"
    df -h /tmp 2>/dev/null | tail -1 | awk '{printf "    Available: %s of %s on %s\n", $4, $2, $6}' \
        || echo "  $WARN  Could not read disk info"

    # Memory
    if [ -f /proc/meminfo ]; then
        MEM_TOTAL=$(grep MemTotal /proc/meminfo | awk '{printf "%.1f GB", $2/1024/1024}')
        MEM_FREE=$(grep MemAvailable /proc/meminfo | awk '{printf "%.1f GB", $2/1024/1024}')
        echo "  Memory: Total=$MEM_TOTAL  Available=$MEM_FREE"
    else
        echo "  $INFO  /proc/meminfo not available (non-Linux)"
    fi

    # CPU count
    CPUS=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo "?")
    echo "  CPU cores: $CPUS"

    {%- if test_choice == "verbose" %}
    echo ""
    echo "  Environment variables (verbose mode):"
    env | sort | grep -v -E "^(LS_COLORS|PS[0-9])" | head -20 | while read -r V; do echo "    $V"; done
    {%- endif %}

    echo ""
    {%- else %}
    echo "[ 5 / 6 ]  Extended Tests — SKIPPED (Enable Extended Tests = false)"
    echo ""
    {%- endif %}

    # ───────────────────────────────────────────────────────
    # 6. OUTPUT FILE WRITE TEST
    # ───────────────────────────────────────────────────────
    echo "[ 6 / 6 ]  Output File Write"
    echo "$SEP"

    {
      printf "SeqNode-OS System Diagnostic Report\n"
      printf "Generated : %s\n" "$(date '+%Y-%m-%d %H:%M:%S')"
      printf "Hostname  : %s\n" "$(hostname 2>/dev/null || echo N/A)"
      printf "User      : %s\n" "$(whoami 2>/dev/null || echo N/A)"
      printf "\n"
      printf "=== Parameters Received ===\n"
      printf "test_string  : %s\n" "{test_string}"
      printf "test_int     : %s\n" "{test_int}"
      printf "test_float   : %s\n" "{test_float}"
      printf "test_bool    : %s\n" "{test_bool}"
      printf "test_choice  : %s\n" "{test_choice}"
      printf "test_file    : %s\n" "{test_file}"
      printf "input_dir    : %s\n" "{input_dir}"
      printf "test_report  : %s\n" "{test_report}"
      printf "\n"
      printf "=== Result ===\n"
      printf "Errors   : %s\n" "$ERRORS"
      printf "Warnings : %s\n" "$WARNINGS"
    } > "{test_report}" && \
        echo "  $PASS  Report written to: {test_report}" || \
        { echo "  $FAIL  Could not write report to: {test_report}"; ERRORS=$((ERRORS+1)); }
    echo ""

    # ───────────────────────────────────────────────────────
    # FINAL SUMMARY
    # ───────────────────────────────────────────────────────
    echo "╔══════════════════════════════════════════════════════╗"
    if [ "$ERRORS" -eq 0 ] && [ "$WARNINGS" -eq 0 ]; then
        echo "║  ✔  ALL TESTS PASSED — System OK                     ║"
    elif [ "$ERRORS" -eq 0 ]; then
        echo "║  ⚠  PASSED WITH $WARNINGS WARNING(S) — check log above    ║"
    else
        echo "║  ✘  $ERRORS ERROR(S), $WARNINGS WARNING(S) — review log above ║"
    fi
    echo "╠══════════════════════════════════════════════════════╣"
    echo "║  Errors  : $ERRORS                                          ║"
    echo "║  Warnings: $WARNINGS                                          ║"
    echo "╚══════════════════════════════════════════════════════╝"
    echo ""

    # Exit with error code if hard failures occurred
    exit $ERRORS

  shell: "/bin/bash"